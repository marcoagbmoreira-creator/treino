<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Progressão — Upper/Lower 3×</title>
<style>
:root{
  --bg:#101214; --surface:#1a1d21; --surface2:#22262b; --border:#2b3138;
  --text:#e9ebee; --muted:#8b929b; --faint:#5c636c;
  --up:#4ade80; --keep:#fbbf24; --hold:#f87171; --accent:#f5a623;
  --radius:14px;
  --mono:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:90px}
.wrap{max-width:640px;margin:0 auto;padding:0 14px}

/* header */
header{padding:22px 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase}
h1{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-top:2px}
h1 small{display:block;font-size:13px;font-weight:500;color:var(--muted);letter-spacing:0;margin-top:3px}
.barload{display:flex;gap:3px;margin-top:12px;height:6px}
.barload span{flex:1;border-radius:2px;background:var(--surface2)}
.barload span.on{background:var(--accent)}

/* tabs */
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(16,18,20,.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;z-index:50}
nav button{flex:1;padding:13px 4px max(13px,env(safe-area-inset-bottom));background:none;border:none;color:var(--faint);font:600 12px/1 inherit;letter-spacing:.04em;cursor:pointer}
nav button .ic{display:block;font-size:18px;margin-bottom:4px}
nav button.active{color:var(--accent)}

/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card h3{font-size:15px;font-weight:700;letter-spacing:-.01em}
.sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}

/* workout chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:9px 16px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-weight:700;font-size:14px;cursor:pointer}
.chip.sel{background:var(--accent);border-color:var(--accent);color:#131313}

/* suggestion badge — plate edge signature */
.decide{display:flex;align-items:center;gap:10px;margin:10px 0 12px;padding:9px 12px;border-radius:10px;background:var(--surface2);border-left:5px solid var(--faint);font-size:13px}
.decide b{font-family:var(--mono);font-size:13px;letter-spacing:.06em}
.decide.up{border-left-color:var(--up)} .decide.up b{color:var(--up)}
.decide.keep{border-left-color:var(--keep)} .decide.keep b{color:var(--keep)}
.decide.hold{border-left-color:var(--hold)} .decide.hold b{color:var(--hold)}
.decide.stall{border-left-color:#c084fc} .decide.stall b{color:#c084fc}
.decide.first{border-left-color:var(--faint)} .decide.first b{color:var(--muted)}

/* set rows */
.sethead,.setrow{display:grid;grid-template-columns:30px 1fr 1fr 1fr 44px;gap:8px;align-items:center}
.lastline{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.linkrow{display:flex;flex-direction:column;gap:7px;padding:11px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.linkrow:last-of-type{border:none}
.linkrow select{width:100%;padding:11px 8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font:600 13px inherit}

.sethead{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;padding:0 2px}
.setrow{margin-bottom:8px}
.setrow .n{font-family:var(--mono);font-size:13px;color:var(--faint);text-align:center}
.setrow input{width:100%;padding:11px 8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font:600 16px var(--mono);text-align:center;-moz-appearance:textfield}
.setrow input::-webkit-outer-spin-button,.setrow input::-webkit-inner-spin-button{-webkit-appearance:none}
.setrow input:focus{outline:none;border-color:var(--accent)}
.setrow input.done{border-color:#3a4a3f}

/* buttons */
.btn{display:block;width:100%;padding:15px;border:none;border-radius:12px;background:var(--accent);color:#131313;font:800 16px inherit;letter-spacing:.01em;cursor:pointer;margin-top:6px}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--surface2);color:var(--text);font-weight:600;font-size:14px;padding:12px;border:1px solid var(--border)}
.btn.danger{background:none;border:1px solid #4a2b2b;color:var(--hold)}
.btn:disabled{opacity:.45}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* program editor */
.exedit{background:var(--surface2);border-radius:10px;padding:12px;margin-top:10px}
.exedit input[type=text]{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font:600 14px inherit;margin-bottom:8px}
.grid6{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fld label{display:block;font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.fld input{width:100%;padding:9px 6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font:600 14px var(--mono);text-align:center}
.mini{background:none;border:none;color:var(--muted);font:600 13px inherit;cursor:pointer;padding:6px 8px}
.mini.red{color:var(--hold)}
.mini.up2{color:var(--accent)}
.exhead{display:flex;justify-content:space-between;align-items:center;gap:8px}
.drag{color:var(--faint);font-size:15px}

/* history */
.hist{border-bottom:1px solid var(--border);padding:12px 2px}
.hist:last-child{border:none}
.hist .d{font-family:var(--mono);font-size:12px;color:var(--accent)}
.hist .t{font-weight:700;margin:1px 0 4px}
.hist .s{font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.7}

/* misc */
.note{font-size:13px;color:var(--muted);line-height:1.55}
.note b{color:var(--text)}
details{margin-top:10px}
summary{cursor:pointer;font-weight:700;font-size:14px;color:var(--accent);list-style:none}
summary::before{content:'▸ '}
details[open] summary::before{content:'▾ '}
details .note{margin-top:8px}
/* AI */
.ai-out{background:var(--surface2);border-radius:10px;padding:14px;margin-top:12px;font-size:14px;line-height:1.65}
.ai-out p{margin:0 0 8px}
.ai-out h4{font-size:14px;color:var(--accent);margin:10px 0 4px}
.ai-out ul{margin:6px 0 10px 18px}
.ai-out li{margin-bottom:4px}
textarea#aiq{width:100%;padding:11px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font:inherit;resize:vertical;min-height:60px}
textarea#aiq:focus{outline:none;border-color:var(--accent)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--faint);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
/* diet */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{background:var(--surface2);border-radius:10px;padding:11px 12px}
.stat .v{font-family:var(--mono);font-size:19px;font-weight:700;letter-spacing:-.01em}
.stat .l{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.stat .v.up{color:var(--up)}.stat .v.down{color:var(--hold)}.stat .v.acc{color:var(--accent)}
#dchart{width:100%;height:220px;display:block;margin-top:10px}
.seg{display:flex;gap:6px;margin-top:10px}
.seg button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font:700 12px inherit;cursor:pointer}
.seg button.on{background:var(--accent);border-color:var(--accent);color:#131313}
.modegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.modegrid button{padding:11px 6px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font:700 13px inherit;cursor:pointer}
.modegrid button.on{background:var(--accent);border-color:var(--accent);color:#131313}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dgrid.g3{grid-template-columns:1fr 1fr 1fr}
.dfld label{display:block;font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.dfld input{width:100%;padding:11px 8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font:600 16px var(--mono);text-align:center}
.dfld input:focus{outline:none;border-color:var(--accent)}
.chkrow{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--muted)}
.chkrow input{width:18px;height:18px;accent-color:var(--accent)}
.dhist{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;padding:9px 2px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12.5px}
.dhist:last-child{border:none}
.dhist .dd{color:var(--accent)}
.dhist .del{color:var(--hold);background:none;border:none;font-size:15px;cursor:pointer;padding:2px 6px}
.coach{margin-top:12px;padding:12px;border-radius:10px;background:var(--surface2);border-left:5px solid var(--accent);font-size:13.5px;line-height:1.55}
.coach b{font-family:var(--mono)}
/* PIN lock */
#lock{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px}
#lock h2{font-size:20px;font-weight:800;letter-spacing:-.01em}
.pindots{display:flex;gap:14px}
.pindots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--faint)}
.pindots span.f{background:var(--accent);border-color:var(--accent)}
.pinpad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pinpad button{height:64px;border-radius:16px;border:1px solid var(--border);background:var(--surface);color:var(--text);font:700 22px var(--mono);cursor:pointer;-webkit-tap-highlight-color:transparent}
.pinpad button:active{background:var(--surface2)}
.pinpad button.ghostk{background:none;border:none;font-size:14px;color:var(--muted)}
#lock.err .pindots{animation:shake .3s}
@keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
/* dashboard */
.calhead{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.calhead .mname{font:700 15px inherit;text-transform:capitalize}
.calhead button{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;cursor:pointer}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px}
.cal .dow{font-family:var(--mono);font-size:10px;color:var(--faint);text-align:center;text-transform:uppercase;padding:4px 0}
.cal .day{aspect-ratio:1;border-radius:10px;background:var(--surface2);border:1.5px solid transparent;display:flex;align-items:center;justify-content:center;font:600 13px var(--mono);color:var(--muted);cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent}
.cal .day.blank{background:none;cursor:default}
.cal .day.t{background:#2b2310;border-color:#5c4a15;color:var(--accent)}
.cal .day .wdot{width:5px;height:5px;border-radius:50%;background:var(--up);position:absolute;bottom:5px;left:50%;transform:translateX(-50%)}
.cal .day.today{border-color:var(--accent)}
.cal .day.sel{outline:2px solid var(--accent);outline-offset:1px}
.cal .day.future{opacity:.35;cursor:default}
.legend{display:flex;gap:16px;margin-top:10px;font-size:11.5px;color:var(--muted);font-family:var(--mono)}
.legend .sq{display:inline-block;width:11px;height:11px;border-radius:3px;background:#2b2310;border:1.5px solid #5c4a15;vertical-align:-1px;margin-right:5px}
.legend .dt{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--up);vertical-align:1px;margin-right:6px}
.streakbig{display:flex;align-items:baseline;gap:8px}
.streakbig .n{font:800 34px var(--mono);color:var(--accent)}
.streakbig .u{font-size:12px;color:var(--muted)}
#tonchart{width:100%;height:150px;display:block;margin-top:10px}
.daydetail{margin-top:12px;background:var(--surface2);border-radius:10px;padding:12px;font-size:13.5px}
.daydetail .dtitle{font-family:var(--mono);font-size:12px;color:var(--accent);margin-bottom:6px}
.daydetail .s{font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.7}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 18px;border-radius:999px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;color:var(--faint);padding:30px 10px;font-size:14px}
.tag{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;color:var(--muted)}
.loading{text-align:center;padding:60px 0;color:var(--faint);font-family:var(--mono);font-size:13px;letter-spacing:.1em}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="lock">
  <div class="eyebrow">Acesso restrito</div>
  <h2>Digite o PIN</h2>
  <div class="pindots"><span></span><span></span><span></span><span></span></div>
  <div class="pinpad">
    <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
    <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
    <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
    <button class="ghostk" data-k="del">apagar</button><button data-k="0">0</button><button class="ghostk" style="visibility:hidden">·</button>
  </div>
</div>
<div class="wrap">
  <header>
    <div class="eyebrow">Dupla progressão autorregulada</div>
    <h1>Progressão de Carga <small>Upper · Lower · 3×/semana — V-taper</small></h1>
    <div class="barload" id="weekbar"></div>
  </header>
  <main id="view"><div class="loading">CARREGANDO…</div></main>
</div>

<nav>
  <button data-tab="home" class="active"><span class="ic">📊</span>Resumo</button>
  <button data-tab="train"><span class="ic">📈</span>Progressão</button>
  <button data-tab="diet"><span class="ic">⚖️</span>Dieta</button>
  <button data-tab="program"><span class="ic">📋</span>Programa</button>
  <button data-tab="ai"><span class="ic">🧠</span>Análise</button>
  <button data-tab="data"><span class="ic">📤</span>Dados</button>
</nav>
<div class="toast" id="toast"></div>

<script>
/* ============ state & storage ============ */
const K_PROG='ul_program_v1', K_HIST='ul_history_v1', K_KEY='ul_apikey_v1', K_MODEL='ul_aimodel_v1', K_GH='ul_ghtoken_v1', K_GIST='ul_gist_v1', K_UPD='ul_updated_v1', K_DIET='ul_diet_v1', K_HEVY='ul_hevykey_v1', K_HSYNC='ul_hevysync_v1';
let program=[], history=[], tab='home', selWorkout=null, memOnly=false, apiKey='', aiModel='gemini-2.5-flash', ghToken='', gistId='', updatedAt=0, syncState='', hevyKey='', hevyLast='';
let diet={entries:{},settings:{mode:'deficit',rate:0.4,protTarget:180,tdee0:2820}}, dietRange=30, homeMonth=new Date(), homeSel=null;

const uid=()=>Math.random().toString(36).slice(2,9);

function defaultProgram(){
  const ex=(name,sets,repMin,repMax,rirMin,rirMax,inc,rest)=>({id:uid(),name,sets,repMin,repMax,rirMin,rirMax,inc,rest:rest||120});
  return [
    {id:uid(),name:'Upper A',exercises:[
      ex('Puxada Alta na Polia (pronada aberta)',4,6,8,2,2,2.5,150),
      ex('Supino Inclinado (Halter)',3,8,10,1,2,2,150),
      ex('Remada Máquina Fechada',4,8,10,1,2,2.5,120),
      ex('Prensa de Ombros Sentada (Máquina)',3,8,10,1,2,2.5,120),
      ex('Elevação Lateral Unilateral (Cabo)',4,12,15,0,1,1.25,75),
      ex('Rosca Direta na Barra W',3,8,10,1,1,2,90),
      ex('Tríceps na Polia (Corda)',3,10,12,1,1,1.25,75)]},
    {id:uid(),name:'Upper B',exercises:[
      ex('Remada Baixa no Cabo (Triângulo)',4,8,10,1,2,2.5,120),
      ex('Supino Reto (Barra ou Máquina)',3,6,8,2,3,2.5,180),
      ex('Pulley Frente Pegada Fechada (ou Pullover Cabo)',3,10,12,1,2,2.5,120),
      ex('Voador Peitoral (Peck Deck)',3,12,15,0,1,2.5,75),
      ex('Elevação Lateral (Halter ou Cabo)',4,12,15,0,1,1.25,75),
      ex('Crucifixo Inverso na Máquina',4,12,15,0,1,2.5,75),
      ex('Rosca Martelo',3,10,12,1,1,2,90),
      ex('Tríceps Francês na Corda (Polia)',3,10,12,1,1,1.25,75)]},
    {id:uid(),name:'Lower',exercises:[
      ex('Agachamento Livre',3,6,8,2,3,2.5,180),
      ex('Leg Press 45°',3,10,12,1,2,5,150),
      ex('Mesa Flexora',4,10,12,1,1,2.5,90),
      ex('Hip Thrust Máquina (ou Ext. Lombar 45°)',3,10,12,1,2,2.5,120),
      ex('Cadeira Extensora',3,12,15,1,1,2.5,75),
      ex('Panturrilha em Pé',4,12,15,1,1,2.5,60),
      ex('Abdominal Infra (Elevação de Pernas)',3,12,15,1,1,0,60)]}
  ];
}

async function sGet(k){
  if(window.storage){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null}catch(e){return null}}
  try{const v=localStorage.getItem('pt_'+k);return v?JSON.parse(v):null}catch(e){return null}
}
async function sSet(k,v){
  if(window.storage){try{await window.storage.set(k,JSON.stringify(v));return}catch(e){}}
  try{localStorage.setItem('pt_'+k,JSON.stringify(v))}catch(e){memOnly=true}
}

async function boot(){
  program=await sGet(K_PROG)||[];
  history=await sGet(K_HIST)||[];
  apiKey=await sGet(K_KEY)||'';
  aiModel=await sGet(K_MODEL)||'gemini-2.5-flash';
  ghToken=await sGet(K_GH)||'';
  gistId=await sGet(K_GIST)||'';
  updatedAt=await sGet(K_UPD)||0;
  const dd=await sGet(K_DIET);
  if(dd){diet.entries=dd.entries||{};diet.settings=Object.assign(diet.settings,dd.settings||{})}
  hevyKey=await sGet(K_HEVY)||'';
  hevyLast=await sGet(K_HSYNC)||'';
  if(ghToken&&gistId)await cloudPull();
  if(!program.length){program=defaultProgram();await saveProgram()}
  /* migração: exercícios sem tempo de descanso ganham um pela faixa de reps */
  for(const wo of program)for(const ex of wo.exercises){
    if(ex.rest==null)ex.rest=ex.repMin<=6?180:(ex.repMin<=8?150:(ex.repMin<=10?120:75));
  }
  selWorkout=program[0]?.id;
  render();
  if(hevyKey)hevySync(false).then(r=>{if(r.n){toast('✓ '+r.n+' treino(s) importados do Hevy');render()}});
  if(memOnly)toast('⚠️ Sem armazenamento — dados só nesta sessão');
}
async function saveProgram(){await sSet(K_PROG,program)}
async function saveHistory(){await sSet(K_HIST,history)}

/* ============ cloud sync (GitHub Gist) ============ */
const GIST_FILE='progressao-treino.json';
const ghHeaders=()=>({'Authorization':'Bearer '+ghToken,'Accept':'application/vnd.github+json','Content-Type':'application/json'});
async function cloudPull(){
  try{
    const r=await fetch('https://api.github.com/gists/'+gistId,{headers:ghHeaders()});
    if(r.status===404){
      gistId='';await sSet(K_GIST,'');
      syncState='☁️ Gist não existe mais — um novo será criado no próximo salvamento';
      return;
    }
    if(!r.ok)throw new Error('HTTP '+r.status);
    const g=await r.json();
    const f=g.files&&g.files[GIST_FILE];
    if(!f)throw new Error('arquivo não encontrado no gist');
    let content=f.content;
    if(f.truncated){const rr=await fetch(f.raw_url);content=await rr.text()}
    const data=JSON.parse(content);
    if((data.updatedAt||0)>(updatedAt||0)){
      if(Array.isArray(data.program))program=data.program;
      if(Array.isArray(data.history))history=data.history;
      if(data.diet&&data.diet.entries){diet.entries=data.diet.entries;diet.settings=Object.assign(diet.settings,data.diet.settings||{})}
      updatedAt=data.updatedAt||Date.now();
      await sSet(K_PROG,program);await sSet(K_HIST,history);await sSet(K_DIET,diet);await sSet(K_UPD,updatedAt);
      syncState='☁️ Baixado da nuvem — '+new Date(updatedAt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    }else{
      syncState='☁️ Local já está atualizado';
    }
  }catch(e){syncState='⚠️ Falha ao baixar: '+(e.message||'rede')}
}
async function cloudPush(){
  if(!ghToken)return;
  try{
    const payload={description:'Progressão de treino — dados (auto-sync)',public:false,files:{}};
    payload.files[GIST_FILE]={content:JSON.stringify({program,history,diet,updatedAt})};
    let r;
    if(gistId){
      r=await fetch('https://api.github.com/gists/'+gistId,{method:'PATCH',headers:ghHeaders(),body:JSON.stringify(payload)});
      if(r.status===404){gistId='';await sSet(K_GIST,'')}
    }
    if(!gistId){
      r=await fetch('https://api.github.com/gists',{method:'POST',headers:ghHeaders(),body:JSON.stringify(payload)});
      if(r.ok){const g=await r.json();gistId=g.id;await sSet(K_GIST,gistId)}
    }
    if(!r.ok)throw new Error('HTTP '+r.status);
    syncState='☁️ Sincronizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){syncState='⚠️ Falha ao enviar: '+(e.message||'rede');toast('⚠️ Sync falhou — dados salvos localmente')}
}
async function findGist(){
  try{
    const r=await fetch('https://api.github.com/gists?per_page=100',{headers:ghHeaders()});
    if(!r.ok)return;
    const list=await r.json();
    const hit=list.find(g=>g.files&&g.files[GIST_FILE]);
    if(hit){gistId=hit.id;await sSet(K_GIST,gistId)}
  }catch(e){}
}
async function touchAndPush(){
  updatedAt=Date.now();
  await sSet(K_UPD,updatedAt);
  if(ghToken)cloudPush();
}

/* ============ progression algorithm ============ */
/* Autoregulated Double Progression (Helms) + stall detection */
function lastEntries(exId,n){
  const out=[];
  for(let i=history.length-1;i>=0&&out.length<n;i--){
    const e=history[i].entries.find(x=>x.exId===exId);
    if(e&&e.sets.some(s=>s.w!=null||s.r!=null))out.push({date:history[i].date,sets:e.sets});
  }
  return out;
}
function refAnalysis(sets,ex){
  const valid=sets.filter(s=>s.r!=null&&s.r!=='');
  if(!valid.length)return null;
  /* peso de referência = moda entre as séries válidas (empate → maior); exclui back-offs/drops da decisão */
  const counts={};
  for(const s of valid){const k=(s.w!=null&&s.w!=='')?+s.w:0;counts[k]=(counts[k]||0)+1}
  let ref=0,best=0;
  for(const k in counts){const c=counts[k];if(c>best||(c===best&&+k>ref)){best=c;ref=+k}}
  const ev=valid.filter(s=>((s.w!=null&&s.w!=='')?+s.w:0)===ref);
  const total=ev.reduce((a,s)=>a+ +s.r,0);
  const rirOk=ev.every(s=>s.rir==null||+s.rir>=ex.rirMin);
  const topCons=ev.every(s=>+s.r>=ex.repMax)&&rirOk;
  const topFlex=total>=ev.length*ex.repMax-1&&rirOk;
  return{
    ref,total,n:ev.length,
    top:(diet.settings.progMode==='flexivel')?topFlex:topCons,
    anyBelow:ev.some(s=>+s.r<ex.repMin),
    ground:ev.some(s=>+s.r<ex.repMin&&s.rir!=null&&+s.rir===0)
  };
}
function suggest(ex){
  const prev=lastEntries(ex.id,5);
  const firstMsg={type:'first',w:null,label:'PRIMEIRA SESSÃO',msg:`Escolha uma carga que dê ${ex.repMin}–${ex.repMax} reps com RIR ${ex.rirMin}${ex.rirMax!==ex.rirMin?'–'+ex.rirMax:''}.`};
  if(!prev.length)return firstMsg;
  const A=refAnalysis(prev[0].sets,ex);
  if(!A)return firstMsg;
  const w=A.ref;
  if(A.top&&ex.inc>0)return{type:'up',w:round25(w+ex.inc),label:'SOBE CARGA',msg:`Faixa dominada nas séries de trabalho (${fmt(w)} kg) → sobe para ${fmt(round25(w+ex.inc))} kg.`};
  if(A.top)return{type:'up',w,label:'PROGRIDE',msg:'Faixa dominada — adicione 1 rep acima do topo ou reduza o RIR.'};
  /* estagnação: 3+ sessões na mesma carga de referência, sem topo E sem evolução no total de reps */
  const run=[A];
  for(let i=1;i<prev.length;i++){
    const P=refAnalysis(prev[i].sets,ex);
    if(!P||P.ref!==w||P.top)break;
    run.push(P);
  }
  const repsGrowing=run.length>=2&&run[0].total>run[1].total;
  const stalled=run.length>=3&&run[0].total<=run[2].total;
  if(stalled){const d=round25(w*0.9);return{type:'stall',w:d,label:'ESTAGNOU — MICRODELOAD',msg:`${run.length} sessões em ${fmt(w)} kg sem evolução de reps (${run[2].total} → ${run[0].total}). Recue ~10% (${fmt(d)} kg) e reconstrua, ou troque o exercício.`}}
  if(A.ground)return{type:'hold',w:ex.inc>0?round25(Math.max(0,w-ex.inc)):w,label:'SEGURA / REDUZ',msg:`Reps abaixo da faixa com RIR 0 → recue ${fmt(ex.inc)} kg e domine a faixa.`};
  if(A.anyBelow)return{type:'hold',w,label:'SEGURA CARGA',msg:'Série de trabalho abaixo da faixa — mantenha o peso até entrar na faixa completa.'};
  return{type:'keep',w,label:'MANTÉM — BUSCA REPS',msg:`Mantenha ${fmt(w)} kg e some reps até ${diet.settings.progMode==='flexivel'?'o total ficar a 1 do máximo':'todas as séries baterem '+ex.repMax}.${repsGrowing?' Reps evoluindo ('+run[1].total+' → '+run[0].total+') — no caminho certo.':''}`};
}
const round25=v=>Math.round(v/0.25)*0.25;
const fmt=v=>(+v).toLocaleString('pt-BR',{maximumFractionDigits:2});

/* ---- HOME / DASHBOARD ---- */
function dISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function sessionsByDay(){const m={};for(const s of history){const k=s.date.slice(0,10);(m[k]=m[k]||[]).push(s)}return m}
function weightStreak(){
  let n=0, d=new Date();
  const has=k=>{const e=diet.entries[k];return e&&e.weight!=null&&e.weight!==''};
  if(!has(dISO(d)))d.setDate(d.getDate()-1); /* hoje ainda não pesou não quebra a sequência */
  while(has(dISO(d))){n++;d.setDate(d.getDate()-1)}
  return n;
}
function trainWeekStreak(sbd){
  /* semanas consecutivas (terminando na atual ou anterior) com 3+ treinos */
  const mon=d=>{const m=new Date(d);m.setDate(m.getDate()-((m.getDay()+6)%7));m.setHours(0,0,0,0);return m};
  const cnt=ws=>{const we=new Date(ws.getTime()+6048e5);return history.filter(h=>{const t=new Date(h.date);return t>=ws&&t<we}).length};
  let w=mon(new Date()), n=0;
  if(cnt(w)>=3){n++;}
  w=new Date(w.getTime()-6048e5);
  while(cnt(w)>=3){n++;w=new Date(w.getTime()-6048e5)}
  return n;
}

function drawTonnage(){
  const cv=document.getElementById('tonchart');if(!cv)return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth, H=150;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  ctx.font='10px ui-monospace,monospace';
  const now=new Date();
  const mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));mon.setHours(0,0,0,0);
  const weeks=[];
  for(let i=7;i>=0;i--){
    const ws=new Date(mon.getTime()-i*6048e5), we=new Date(ws.getTime()+6048e5);
    let ton=0;
    for(const s of history){const t=new Date(s.date);if(t>=ws&&t<we)for(const e of s.entries)for(const st of e.sets)if(st.r!=null&&st.w!=null)ton+=st.w*st.r}
    weeks.push({label:String(ws.getDate()).padStart(2,'0')+'/'+String(ws.getMonth()+1).padStart(2,'0'),ton});
  }
  const mx=Math.max(...weeks.map(w=>w.ton),1);
  if(mx<=1){ctx.fillStyle='#5c636c';ctx.font='13px sans-serif';ctx.fillText('Registre treinos para ver o volume',20,75);return}
  const bw=(W-20)/8;
  weeks.forEach((w,i)=>{
    const h=(w.ton/mx)*(H-42);
    const x=10+i*bw+bw*0.15, y=H-24-h;
    ctx.fillStyle=i===7?'#f5a623':'#6b5316';
    ctx.beginPath();ctx.roundRect(x,y,bw*0.7,h,4);ctx.fill();
    ctx.fillStyle='#8b929b';
    if(w.ton>0){const lbl=w.ton>=1000?(w.ton/1000).toFixed(1)+'t':Math.round(w.ton)+'';ctx.fillText(lbl,x+bw*0.35-ctx.measureText(lbl).width/2,y-5)}
    ctx.fillStyle='#5c636c';
    ctx.fillText(w.label,x+bw*0.35-ctx.measureText(w.label).width/2,H-8);
  });
}

function renderTrain(){
  if(!program.length){view.innerHTML='<div class="empty">Nenhum treino no programa. Crie um na aba Programa.</div>';return}
  if(!program.find(w=>w.id===selWorkout))selWorkout=program[0].id;
  const wo=program.find(w=>w.id===selWorkout);
  const dlRef=diet.settings.lastDeload||(history.length?history[0].date.slice(0,10):null);
  const dlWks=dlRef?Math.floor((Date.now()-new Date(dlRef).getTime())/6048e5):0;
  let bn='';
  if(dlRef&&dlWks>=6)bn=`<div class="decide stall" style="margin-bottom:14px"><b>DELOAD SUGERIDO</b><span style="font-size:12.5px;color:var(--muted)">${dlWks} semanas sem deload — faça uma semana com metade das séries e cargas ~15% menores. <button class="mini up2" id="deloaddone" style="padding:0 4px;text-decoration:underline">marcar como feito</button></span></div>`;
  let h=bn+`<div class="chips">${program.map(w=>`<button class="chip ${w.id===selWorkout?'sel':''}" data-wo="${w.id}">${esc(w.name)}</button>`).join('')}</div>`;
  h+=wo.exercises.map(ex=>{
    const sg=suggest(ex);
    const prev=lastEntries(ex.id,1)[0];
    let lastLine='';
    if(prev){
      const v=prev.sets.filter(s=>s.r!=null);
      const wmax=Math.max(...v.map(s=>+s.w||0));
      const reps=v.map(s=>s.r).join('/');
      const rirs=v.filter(s=>s.rir!=null).map(s=>s.rir).join('/');
      lastLine=`<div class="lastline">Última (${new Date(prev.date).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}): ${fmt(wmax)} kg × ${reps}${rirs?' · RIR '+rirs:''}</div>`;
    }
    return `<div class="card">
      <h3>${esc(ex.name)}</h3>
      <div class="sub">${ex.sets} × ${ex.repMin}–${ex.repMax} reps · RIR ${ex.rirMin}${ex.rirMax!==ex.rirMin?'–'+ex.rirMax:''} · +${fmt(ex.inc)} kg</div>
      <div class="decide ${sg.type}"><b>${sg.label}${sg.w!=null?' · '+fmt(sg.w)+' kg':''}</b></div>
      <div class="note" style="margin:-4px 0 0;font-size:12.5px">${sg.msg}</div>
      ${lastLine}
    </div>`;
  }).join('');
  const un=unmatchedHevy();
  if(un.length){
    const opts='<option value="">— escolher —</option>'+program.map(w2=>w2.exercises.map(ex=>`<option value="${ex.id}">${esc(w2.name)}: ${esc(ex.name)}</option>`).join('')).join('');
    h+=`<div class="card"><h3>🔗 Exercícios do Hevy sem vínculo</h3>
      <p class="note" style="margin:8px 0 4px">Vincule cada um ao exercício correspondente do programa — o histórico passa a alimentar a progressão e importações futuras já chegam conectadas.</p>
      ${un.map(u=>`<div class="linkrow"><span>${esc(u.name)} <span class="tag">${u.count}× no histórico</span></span><select data-link="${esc(u.exId)}">${opts}</select></div>`).join('')}
      <button class="btn ghost" id="dolink" style="margin-top:12px">Vincular selecionados</button>
    </div>`;
  }
  view.innerHTML=h;
  view.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{selWorkout=c.dataset.wo;render()});
  const dl=document.getElementById('deloaddone');
  if(dl)dl.onclick=async()=>{diet.settings.lastDeload=todayISO();await saveDiet();await touchAndPush();toast('✓ Deload registrado');render()};
  view.querySelectorAll('.setrow input').forEach(i=>i.addEventListener('input',()=>i.classList.toggle('done',i.value!=='')));
  const dlk=document.getElementById('dolink');
  if(dlk)dlk.onclick=async()=>{
    let n=0;
    for(const sel of view.querySelectorAll('select[data-link]')){
      if(sel.value){await linkHevy(sel.dataset.link,sel.value);n++}
    }
    if(!n){toast('Escolha ao menos um vínculo');return}
    toast('✓ '+n+' exercício(s) vinculados');
    render();
  };
}
async function linkHevy(hevyExId,progExId){
  let target=null;
  for(const wo of program){const ex=wo.exercises.find(x=>x.id===progExId);if(ex){target=ex;break}}
  if(!target)return;
  target.hevyId=String(hevyExId).replace(/^hevy_/,'');
  for(const s of history)for(const e of s.entries)if(e.exId===hevyExId){e.exId=target.id;e.exName=target.name}
  await saveHistory();await saveProgram();await touchAndPush();
}
function unmatchedHevy(){
  const m={};
  for(const s of history)for(const e of s.entries){
    if(String(e.exId).startsWith('hevy_')){
      if(!m[e.exId])m[e.exId]={exId:e.exId,name:e.exName,count:0};
      m[e.exId].count++;
    }
  }
  return Object.values(m).sort((a,b)=>b.count-a.count);
}

/* ============ CSV (pt-BR Excel) ============ */
function exportCSV(){
  let rows=['sep=;','Data;Hora;Treino;Exercício;Série;Carga (kg);Reps;RIR'];
  for(const s of history){
    const d=new Date(s.date);
    const ds=d.toLocaleDateString('pt-BR'),ts=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    for(const e of s.entries)e.sets.forEach((st,i)=>{
      if(st.r==null&&st.w==null)return;
      rows.push([ds,ts,s.workoutName,e.exName,i+1,st.w!=null?String(st.w).replace('.',','):'',st.r??'',st.rir??''].map(csvq).join(';'));
    });
  }
  download('historico-treinos.csv','\uFEFF'+rows.join('\r\n'),'text/csv;charset=utf-8');
  toast('✓ CSV exportado');
}
const csvq=v=>{v=String(v);return /[;"\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v};
function parseCSVLine(line){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){const c=line[i];
    if(q){if(c==='"'){if(line[i+1]==='"'){cur+='"';i++}else q=false}else cur+=c}
    else if(c==='"')q=true;
    else if(c===';'){out.push(cur);cur=''}
    else cur+=c;
  }
  out.push(cur);return out;
}
async function importCSV(ev){
  const f=ev.target.files[0];if(!f)return;
  const text=(await f.text()).replace(/^\uFEFF/,'');
  const lines=text.split(/\r?\n/).filter(l=>l.trim()&&!/^sep=/.test(l)&&!/^Data;/.test(l));
  const sessions={};let n=0;
  for(const line of lines){
    const [ds,ts,wn,en,si,w,r,rir]=parseCSVLine(line);
    if(!ds||!en)continue;
    const [dd,mm,yy]=ds.split('/');
    const iso=new Date(`${yy}-${mm}-${dd}T${(ts||'12:00')}:00`).toISOString();
    const key=ds+'|'+wn;
    if(!sessions[key]){
      const wo=program.find(x=>x.name===wn);
      sessions[key]={id:uid(),date:iso,workoutId:wo?wo.id:'imported',workoutName:wn,entries:[]};
    }
    const sess=sessions[key];
    let entry=sess.entries.find(e=>e.exName===en);
    if(!entry){
      let exId='imp_'+en;
      for(const wo of program){const m=wo.exercises.find(e=>e.name===en);if(m){exId=m.id;break}}
      entry={exId,exName:en,sets:[]};sess.entries.push(entry);
    }
    entry.sets[(+si||entry.sets.length+1)-1]={w:w?+String(w).replace(',','.'):null,r:r?+r:null,rir:rir!==''?+rir:null};
    n++;
  }
  for(const key in sessions){
    const s=sessions[key];
    history=history.filter(h=>!(new Date(h.date).toLocaleDateString('pt-BR')+'|'+h.workoutName===key));
    history.push(s);
  }
  history.sort((a,b)=>new Date(a.date)-new Date(b.date));
  await saveHistory();await touchAndPush();ev.target.value='';
  render();toast(`✓ ${n} séries importadas`);
}

async function importJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  try{
    const data=JSON.parse(await f.text());
    if(!Array.isArray(data.program)||!Array.isArray(data.history))throw 0;
    program=data.program;history=data.history;
    if(data.diet&&data.diet.entries){diet.entries=data.diet.entries;diet.settings=Object.assign(diet.settings,data.diet.settings||{});await saveDiet()}
    await saveProgram();await saveHistory();await touchAndPush();
    selWorkout=program[0]?.id;ev.target.value='';
    render();toast('✓ Backup restaurado');
  }catch(e){toast('Arquivo inválido')}
}
function download(name,content,type){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type}));
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}

function mdToHtml(md){
  const e=esc(md);
  return e.split(/\n{2,}/).map(b=>{
    const lines=b.split('\n').filter(l=>l.trim()!=='');
    if(lines.length&&lines.every(l=>/^[-*•] /.test(l.trim())))return '<ul>'+lines.map(l=>'<li>'+l.trim().replace(/^[-*•] /,'')+'</li>').join('')+'</ul>';
    if(/^#{1,4} /.test(lines[0]||''))return '<h4>'+lines[0].replace(/^#+ /,'')+'</h4>'+(lines.length>1?'<p>'+lines.slice(1).join('<br>')+'</p>':'');
    return '<p>'+lines.join('<br>')+'</p>';
  }).join('').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<i>$2</i>');
}

/* ============ diet / adaptive TDEE (MacroFactor-style) ============ */
const KCAL_PER_KG=7700, EWMA_ALPHA=0.2;
async function saveDiet(){await sSet(K_DIET,diet)}
const todayISO=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
function dietDates(){return Object.keys(diet.entries).sort()}
function computeTrend(){
  const wd=dietDates().filter(d=>diet.entries[d].weight!=null&&diet.entries[d].weight!=='');
  const trend={};
  if(!wd.length)return trend;
  let t=+diet.entries[wd[0]].weight;
  trend[wd[0]]=t;
  for(let i=1;i<wd.length;i++){
    const w0=+diet.entries[wd[i-1]].weight, w1=+diet.entries[wd[i]].weight;
    const gap=Math.max(1,Math.round((new Date(wd[i])-new Date(wd[i-1]))/86400000));
    for(let g=1;g<=gap;g++){
      const wi=w0+(w1-w0)*g/gap; /* interpola dias sem pesagem */
      t=t+EWMA_ALPHA*(wi-t);
    }
    trend[wd[i]]=t;
  }
  return trend;
}
function olsSlope(pairs){ /* regressão linear simples: [ [dias,y] ] → kg/dia */
  const n=pairs.length;
  const mx=pairs.reduce((s,p)=>s+p[0],0)/n, my=pairs.reduce((s,p)=>s+p[1],0)/n;
  let num=0,den=0;
  for(const[x,y]of pairs){num+=(x-mx)*(y-my);den+=(x-mx)*(x-mx)}
  return den?num/den:0;
}
function computeTDEE(){
  const trend=computeTrend();
  const wd=Object.keys(trend).sort();
  if(wd.length<4)return null;
  const end=wd[wd.length-1], endT=new Date(end).getTime();
  const win=wd.filter(d=>(endT-new Date(d).getTime())/86400000<=27);
  if(win.length<4)return null;
  const days=(endT-new Date(win[0]).getTime())/86400000;
  if(days<7)return null;
  const kd=dietDates().filter(d=>d>=win[0]&&d<=end&&diet.entries[d].kcal!=null&&diet.entries[d].kcal!==''&&!diet.entries[d].inc);
  if(kd.length<4)return null;
  const slope=olsSlope(win.map(d=>[(new Date(d).getTime()-endT)/86400000,trend[d]])); /* kg/dia via regressão */
  const avgK=kd.reduce((s,d)=>s+ +diet.entries[d].kcal,0)/kd.length;
  const observed=avgK-slope*KCAL_PER_KG;
  /* confiança cresce com nº de dias de kcal, nº de pesagens e amplitude da janela */
  const conf=Math.min(1,kd.length/12)*Math.min(1,win.length/10)*Math.min(1,days/14);
  const tdee=Math.round(conf*observed+(1-conf)*diet.settings.tdee0);
  return{tdee,observed:Math.round(observed),conf,avgK:Math.round(avgK),days:Math.round(days),nK:kd.length};
}
function weeklyRate(){
  const trend=computeTrend();
  const wd=Object.keys(trend).sort();
  if(wd.length<3)return null;
  const endT=new Date(wd[wd.length-1]).getTime();
  const win=wd.filter(d=>(endT-new Date(d).getTime())/86400000<=14);
  if(win.length<3)return null;
  if((endT-new Date(win[0]).getTime())/86400000<5)return null;
  return olsSlope(win.map(d=>[(new Date(d).getTime()-endT)/86400000,trend[d]]))*7;
}
function targetKcal(){
  const t=computeTDEE();
  const base=t?t.tdee:diet.settings.tdee0;
  const s=diet.settings;
  const adj=s.rate*KCAL_PER_KG/7;
  const raw=Math.round(s.mode==='deficit'?base-adj:(s.mode==='surplus'?base+adj:base));
  const today=todayISO();
  if(!s.lastCoach||!s.lastCoach.goal){s.lastCoach={date:today,goal:raw};saveDiet();return{goal:raw,base,observed:!!t,next:7,changed:false}}
  const daysSince=Math.floor((new Date(today)-new Date(s.lastCoach.date))/86400000);
  if(daysSince>=7){ /* check-in semanal: ajuste gradual, máx ±200 kcal por vez */
    const step=Math.max(-200,Math.min(200,raw-s.lastCoach.goal));
    const goal=s.lastCoach.goal+step;
    s.lastCoach={date:today,goal};saveDiet();
    return{goal,base,observed:!!t,next:7,changed:step!==0};
  }
  return{goal:s.lastCoach.goal,base,observed:!!t,next:7-daysSince,changed:false};
}

function drawDietChart(){
  const cv=document.getElementById('dchart');if(!cv)return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth, H=220;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const trend=computeTrend();
  const all=dietDates().filter(d=>diet.entries[d].weight!=null&&diet.entries[d].weight!=='');
  ctx.font='11px ui-monospace,monospace';
  if(all.length<2){ctx.fillStyle='#5c636c';ctx.fillText('Registre pesagens para ver o gráfico',20,110);return}
  const endT=new Date(all[all.length-1]).getTime();
  const fromT=dietRange===0?new Date(all[0]).getTime():endT-dietRange*86400000;
  const ds=all.filter(d=>new Date(d).getTime()>=fromT);
  if(ds.length<2){ctx.fillStyle='#5c636c';ctx.fillText('Poucos dados no período',20,110);return}
  let mn=Infinity,mx=-Infinity;
  ds.forEach(d=>{mn=Math.min(mn,+diet.entries[d].weight,trend[d]);mx=Math.max(mx,+diet.entries[d].weight,trend[d])});
  const pad=(mx-mn)*0.15||0.5;mn-=pad;mx+=pad;
  const X=d=>38+((new Date(d).getTime()-fromT)/(endT-fromT||1))*(W-50);
  const Y=v=>H-22-((v-mn)/(mx-mn))*(H-40);
  ctx.strokeStyle='#2b3138';ctx.fillStyle='#5c636c';ctx.lineWidth=1;
  for(let i=0;i<=3;i++){
    const v=mn+(mx-mn)*i/3, y=Y(v);
    ctx.beginPath();ctx.moveTo(36,y);ctx.lineTo(W-8,y);ctx.stroke();
    ctx.fillText(v.toFixed(1),2,y+4);
  }
  ctx.fillStyle='#6b7280';
  ds.forEach(d=>{ctx.beginPath();ctx.arc(X(d),Y(+diet.entries[d].weight),2.6,0,7);ctx.fill()});
  ctx.strokeStyle='#f5a623';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.beginPath();
  ds.forEach((d,i)=>{const x=X(d),y=Y(trend[d]);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
  ctx.stroke();
}

/* ============ Hevy sync ============ */
const normName=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
function matchProgramEx(he){
  for(const wo of program)for(const ex of wo.exercises)if(ex.hevyId&&ex.hevyId===he.exercise_template_id)return ex;
  const ht=normName(he.title);
  if(!ht)return null;
  let best=null,bestScore=0;
  for(const wo of program)for(const ex of wo.exercises){
    const et=normName(ex.name);
    let score=0;
    for(const t of et.split(' '))if(t.length>3&&ht.includes(t))score++;
    for(const t of ht.split(' '))if(t.length>3&&et.includes(t))score++;
    if(score>bestScore){bestScore=score;best=ex}
  }
  if(best&&bestScore>=2){best.hevyId=he.exercise_template_id;return best}
  return null;
}
function convertHevy(w){
  const entries=[];
  for(const he of (w.exercises||[])){
    const sets=(he.sets||[]).filter(s=>s.type!=='warmup').map(s=>({
      w:s.weight_kg!=null?+s.weight_kg:null,
      r:s.reps!=null?+s.reps:null,
      rir:s.rpe!=null?Math.max(0,Math.round(10-s.rpe)):null
    }));
    if(!sets.some(s=>s.r!=null))continue;
    const m=matchProgramEx(he);
    entries.push({exId:m?m.id:'hevy_'+(he.exercise_template_id||normName(he.title)),exName:m?m.name:(he.title||'Exercício'),sets});
  }
  return entries;
}
async function hevySync(manual){
  if(!hevyKey)return{n:0};
  const known=new Set(history.map(h=>h.hevyId).filter(Boolean));
  let added=0,page=1;
  const maxPages=manual?60:3;
  try{
    while(page<=maxPages){
      const r=await fetch('https://api.hevyapp.com/v1/workouts?page='+page+'&pageSize=10',{headers:{'api-key':hevyKey}});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const data=await r.json();
      const list=data.workouts||[];
      let newInPage=0;
      for(const w of list){
        if(!w.id||known.has(w.id))continue;
        const entries=convertHevy(w);
        if(!entries.length)continue;
        const title=w.title||'Treino Hevy';
        const wo=program.find(x=>normName(x.name)===normName(title));
        history.push({id:uid(),hevyId:w.id,date:w.start_time||w.created_at||new Date().toISOString(),workoutId:wo?wo.id:'hevy',workoutName:title,entries});
        known.add(w.id);added++;newInPage++;
      }
      if(list.length<10)break;
      if(!manual&&newInPage===0)break; /* sync rápido: parou de achar novidade */
      page++;
    }
    if(added){
      history.sort((a,b)=>new Date(a.date)-new Date(b.date));
      await saveHistory();await saveProgram();/* persiste os hevyId mapeados */
      await touchAndPush();
      hevyLast=new Date().toISOString();await sSet(K_HSYNC,hevyLast);
    }
    return{n:added};
  }catch(e){return{n:added,err:e&&e.message?e.message:'rede/CORS'}}
}

async function hevyImportRoutines(){
  if(!hevyKey)return{err:'configure a chave do Hevy na aba Dados'};
  let page=1, routines=[];
  try{
    while(page<=10){
      const r=await fetch('https://api.hevyapp.com/v1/routines?page='+page+'&pageSize=10',{headers:{'api-key':hevyKey}});
      if(!r.ok)throw new Error('HTTP '+r.status);
      const d=await r.json();
      const list=d.routines||[];
      routines.push(...list);
      if(list.length<10)break;
      page++;
    }
  }catch(e){return{err:e&&e.message?e.message:'rede/CORS'}}
  if(!routines.length)return{err:'nenhuma rotina encontrada no Hevy'};
  let created=0,updated=0,moved=0,newEx=0;
  const seenRid=new Set();
  for(const rt of routines){
    seenRid.add(rt.id);
    let wo=program.find(w=>w.hevyRid===rt.id)||program.find(w=>normName(w.name)===normName(rt.title));
    if(!wo){wo={id:uid(),name:rt.title||'Treino',hevyRid:rt.id,exercises:[]};program.push(wo);created++}
    else{wo.hevyRid=rt.id;wo.name=rt.title||wo.name;updated++}
    const newList=[];
    for(const he of (rt.exercises||[])){
      const tid=he.exercise_template_id;
      const work=(he.sets||[]).filter(s=>s.type!=='warmup');
      const nSets=Math.max(1,work.length);
      let rmin=null,rmax=null;
      for(const s of work){
        const lo=s.rep_range&&s.rep_range.start!=null?+s.rep_range.start:(s.reps!=null?+s.reps:null);
        const hi=s.rep_range&&s.rep_range.end!=null?+s.rep_range.end:(s.reps!=null?+s.reps:null);
        if(lo!=null)rmin=rmin==null?lo:Math.min(rmin,lo);
        if(hi!=null)rmax=rmax==null?hi:Math.max(rmax,hi);
      }
      let ex=null,fromWo=null;
      if(tid)for(const w2 of program){const f=w2.exercises.find(x=>x.hevyId===tid);if(f){ex=f;fromWo=w2;break}}
      if(ex){
        /* já existe: preserva id (histórico), RIR e incremento; move de treino se necessário */
        if(fromWo!==wo){fromWo.exercises=fromWo.exercises.filter(x=>x!==ex);moved++}
        ex.name=he.title||ex.name;
        ex.sets=nSets;
        if(rmin!=null)ex.repMin=rmin;
        if(rmax!=null)ex.repMax=Math.max(rmax,ex.repMin);
      }else{
        const rMin=rmin!=null?rmin:8, rMax=rmax!=null?Math.max(rmax,rMin):12;
        ex={id:uid(),name:he.title||'Exercício',sets:nSets,repMin:rMin,repMax:rMax,rirMin:1,rirMax:2,inc:rMin<=8?2.5:1.25,rest:120,hevyId:tid||null};
        newEx++;
      }
      newList.push(ex);
    }
    if(newList.length)wo.exercises=newList;
  }
  const obsolete=program.filter(w=>(w.hevyRid&&!seenRid.has(w.hevyRid))||w.exercises.length===0);
  if(obsolete.length){
    if(confirm('Estes treinos não existem mais no Hevy (ou ficaram vazios):\n\n'+obsolete.map(w=>'• '+w.name).join('\n')+'\n\nRemover do programa? (o histórico deles é preservado)')){
      program=program.filter(w=>!obsolete.includes(w));
    }
  }
  if(!program.find(w=>w.id===selWorkout))selWorkout=program[0]?.id;
  await saveProgram();await touchAndPush();
  return{created,updated,moved,newEx};
}

/* ============ util ============ */
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2600)}
/* ============ PIN lock ============ */
const PIN_H=2085891405; /* hash do PIN — o código não guarda o PIN em texto */
function djb2(s){let h=5381;for(let i=0;i<s.length;i++)h=((h*33)^s.charCodeAt(i))>>>0;return h}
let pinBuf='';
function pinInit(){
  let ok=false;try{ok=sessionStorage.getItem('ul_unlocked')==='1'}catch(e){}
  const L=document.getElementById('lock');
  if(ok){L.remove();boot();return}
  L.querySelectorAll('.pinpad button').forEach(b=>b.onclick=()=>{
    const k=b.dataset.k;if(k==null)return;
    if(k==='del')pinBuf=pinBuf.slice(0,-1);
    else if(pinBuf.length<4)pinBuf+=k;
    L.querySelectorAll('.pindots span').forEach((s,i)=>s.classList.toggle('f',i<pinBuf.length));
    if(pinBuf.length===4){
      if(djb2(pinBuf)===PIN_H){
        try{sessionStorage.setItem('ul_unlocked','1')}catch(e){}
        L.remove();boot();
      }else{
        L.classList.add('err');
        setTimeout(()=>{L.classList.remove('err');pinBuf='';L.querySelectorAll('.pindots span').forEach(s=>s.classList.remove('f'))},350);
      }
    }
  });
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{if(tab==='program')harvest();tab=b.dataset.tab;render()});
pinInit();
